{% extends 'base.html' %}
{% block content %}

<div class="row justify-content-center mt-4">
  <div class="col-md-5 col-lg-4">

    <div class="text-center mb-4">
      <div style="width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:1.8rem;margin:0 auto 1rem;box-shadow:0 8px 24px rgba(99,102,241,0.35);">⚡</div>
      <h3 class="fw-bold mb-1" style="color:var(--text);">Welcome back</h3>
      <p style="color:var(--text-muted);font-size:0.9rem;">Sign in to continue your quest</p>
    </div>

    <div class="card p-4 card-glow">
      <form method="POST">
        {% csrf_token %}
        {% for field in form %}
        <div class="mb-3">
          <label class="form-label">{{ field.label }}</label>
          {{ field }}
          {% if field.errors %}
          <div style="color:#f87171;font-size:0.8rem;margin-top:0.3rem;">{{ field.errors }}</div>
          {% endif %}
        </div>
        {% endfor %}
        <button type="submit" class="btn btn-quest w-100 py-2 mt-1" style="font-size:0.95rem;">
          Sign In <i class="fas fa-arrow-right ms-2"></i>
        </button>
      </form>
      <p class="text-center mt-3 mb-0" style="color:var(--text-muted);font-size:0.875rem;">
        No account? <a href="{% url 'signup' %}" style="color:var(--purple-light);font-weight:600;">Sign up free</a>
      </p>
    </div>

  </div>
</div>

{% endblock %}
