{% extends 'base.html' %}
{% block content %}
<div style="min-height:calc(100vh - 56px - 4rem);display:flex;align-items:center;justify-content:center;">
  <div style="width:100%;max-width:380px;">

    <div class="text-center mb-5">
      <div style="width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,var(--indigo),var(--violet));display:flex;align-items:center;justify-content:center;font-size:1.4rem;margin:0 auto 1.25rem;box-shadow:0 8px 24px rgba(99,102,241,.3);">
        <i class="fas fa-bolt" style="color:#fff;"></i>
      </div>
      <h2 style="font-size:1.5rem;font-weight:800;letter-spacing:-.5px;color:var(--text);margin-bottom:.4rem;">Welcome back</h2>
      <p style="color:var(--text-2);font-size:.875rem;">Sign in to continue your journey</p>
    </div>

    <div class="card card-glow p-4">
      <form method="POST">
        {% csrf_token %}
        {% for field in form %}
        <div class="mb-3">
          <label class="form-label">{{ field.label }}</label>
          {{ field }}
          {% if field.errors %}
          <div style="color:var(--rose-2);font-size:.78rem;margin-top:.3rem;">{{ field.errors.as_text }}</div>
          {% endif %}
        </div>
        {% endfor %}
        <button type="submit" class="btn-primary-ql w-100 justify-content-center mt-1" style="padding:.65rem;">
          Sign in <i class="fas fa-arrow-right" style="font-size:.75rem;"></i>
        </button>
      </form>
      <p class="text-center mt-4 mb-0" style="color:var(--text-2);font-size:.845rem;">
        No account? <a href="{% url 'signup' %}" style="color:var(--indigo-2);font-weight:600;">Create one free</a>
      </p>
    </div>

  </div>
</div>
{% endblock %}
