{% extends 'base.html' %}
{% block content %}

<div class="d-flex align-items-start justify-content-between mb-5 flex-wrap gap-3">
  <div>
    <p style="color:var(--text-2);font-size:.82rem;font-weight:500;text-transform:uppercase;letter-spacing:.8px;margin-bottom:.3rem;">Account</p>
    <h1 class="page-title" style="font-size:1.6rem;">Settings</h1>
  </div>
  <a href="{% url 'profile' %}" class="btn-ghost">← Profile</a>
</div>

<div style="max-width:520px;">

  <!-- Email -->
  <div class="card p-4 mb-3" style="border-color:rgba(99,102,241,.12);">
    <h5 style="font-size:.9rem;font-weight:700;color:var(--text);margin-bottom:1rem;">Email address</h5>
    <form method="POST">
      {% csrf_token %}
      <input type="hidden" name="action" value="update_email">
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control" value="{{ user.email }}" required>
      </div>
      <button type="submit" class="btn-primary-ql" style="padding:.5rem 1.25rem;font-size:.845rem;">Save email</button>
    </form>
  </div>

  <!-- Password -->
  <div class="card p-4" style="border-color:rgba(99,102,241,.12);">
    <h5 style="font-size:.9rem;font-weight:700;color:var(--text);margin-bottom:1rem;">Change password</h5>
    <form method="POST">
      {% csrf_token %}
      <input type="hidden" name="action" value="update_password">
      <div class="mb-3">
        <label class="form-label">New password</label>
        <input type="password" name="password1" class="form-control" placeholder="New password" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Confirm password</label>
        <input type="password" name="password2" class="form-control" placeholder="Confirm password" required>
      </div>
      <button type="submit" class="btn-primary-ql" style="padding:.5rem 1.25rem;font-size:.845rem;">Update password</button>
    </form>
  </div>

</div>

{% endblock %}
